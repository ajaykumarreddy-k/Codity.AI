version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://codity:codity_pass@postgres:5432/codity_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkey_change_in_production
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python -m app.worker.worker
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://codity:codity_pass@postgres:5432/codity_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkey_change_in_production
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=codity
      - POSTGRES_PASSWORD=codity_pass
      - POSTGRES_DB=codity_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codity -d codity_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.0-M02-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
